name: ai-processing-service CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SERVICE: ai-processing-service
  AWS_REGION: us-east-1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install system dependencies (poppler)
        run: sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          GOOGLE_API_KEY: fake-google-key-for-tests
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          S3_BUCKET_NAME: test-bucket
          SQS_QUEUE_URL: http://localhost:4566/000000000000/test-queue
          UPLOAD_SERVICE_URL: http://localhost:8001
          REPORT_SERVICE_URL: http://localhost:8003
          INTERNAL_SERVICE_TOKEN: test-token
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: ai-processing-service

  build-and-push:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/fiap-hackaton-prod/${{ env.SERVICE }}:$IMAGE_TAG \
                       -t $ECR_REGISTRY/fiap-hackaton-prod/${{ env.SERVICE }}:latest \
                       .
          docker push $ECR_REGISTRY/fiap-hackaton-prod/${{ env.SERVICE }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/fiap-hackaton-prod/${{ env.SERVICE }}:latest

  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force ECS service re-deployment
        run: |
          aws ecs update-service \
            --cluster fiap-hackaton-prod-cluster \
            --service fiap-hackaton-prod-ai-processing \
            --force-new-deployment
